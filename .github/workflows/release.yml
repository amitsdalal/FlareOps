# Release workflow.
#
# Triggered when a `vX.Y.Z` tag is pushed. It:
#   1. Re-runs CI/validate as a final guard (cheap insurance).
#   2. Generates release notes from the CHANGELOG and recent commits.
#   3. Creates a GitHub Release.
#   4. Moves/updates the floating major tag (e.g. `v1`) so consumers using
#      `@v1` automatically get the latest patch release in that major series.
#
# We follow the GitHub-recommended convention of floating major tags. See:
# https://docs.github.com/en/actions/creating-actions/about-custom-actions#using-tags-for-release-management

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)release, e.g. v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Pre-release validation
    uses: ./.github/workflows/validate.yml
    permissions:
      contents: read

  release:
    name: Publish GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          # Sanity-check semver: vMAJOR.MINOR.PATCH with optional prerelease.
          if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag '${tag}' is not a valid semver (expected vX.Y.Z)."
            exit 1
          fi
          major="${tag%%.*}"
          echo "tag=${tag}"   >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Prefer CHANGELOG section if present; fall back to git log.
          if [[ -f CHANGELOG.md ]] && grep -qF "## ${tag}" CHANGELOG.md; then
            awk -v tag="## ${tag}" '
              $0 == tag { found=1; next }
              found && /^## / { exit }
              found
            ' CHANGELOG.md > release-notes.md
          else
            prev="$(git tag --list 'v*.*.*' --sort=-v:refname | grep -v "^${tag}$" | head -n1 || true)"
            range="${prev:+${prev}..}${tag}"
            git log --pretty=format:'- %s (%h)' "${range}" > release-notes.md
          fi
          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}

      - name: Update floating major tag
        if: ${{ !contains(steps.tag.outputs.tag, '-') }}
        env:
          MAJOR: ${{ steps.tag.outputs.major }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Floating major tag convention: users pin `@v1` and get the latest
          # patch in that major. Skip on prereleases so a `v1.0.0-rc1` tag
          # doesn't accidentally make `v1` point at a prerelease.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${MAJOR}" -m "Update ${MAJOR} → ${TAG}"
          git push origin "${MAJOR}" --force
