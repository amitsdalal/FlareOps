# Stand-alone shellcheck workflow.
#
# The CI workflow already runs shellcheck, but we keep this as a separate
# entry point so contributors can re-run it directly via `workflow_dispatch`
# and so it shows up as its own status check (some org branch-protection
# rules require named, stable check IDs).

name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - 'purge-cache/scripts/**'
      - 'purge-cache/tests/**'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'purge-cache/scripts/**'
      - 'purge-cache/tests/**'
      - '.github/workflows/shellcheck.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1091: "Not following: <file> was not specified as input"
          #   — fired because shellcheck can't follow `source` paths that
          #     resolve at runtime via $SCRIPT_DIR. We declare the source
          #     with `# shellcheck source=...` directives in-file, but
          #     shellcheck still warns. Suppressing this org-wide is safe.
          SHELLCHECK_OPTS: -e SC1091 -s bash
        with:
          scandir: ./purge-cache
          severity: warning
